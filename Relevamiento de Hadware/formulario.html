<body>

<header>
    <h1>Formulario de Relevamiento</h1>
</header>

<nav>
    <a href="index.html">Volver</a>
</nav>

<main>

<section>

<form action="#" method="POST">

    <label>Nombre del equipo</label><br>
    <input type="text" name="equipo">
    <br><br>

    <label>Fecha del relevamiento</label><br>
    <input type="date" name="fecha">
    <br><br>

    <label>Tipo de CPU</label><br>
    <select name="cpu">
        <option>Intel i3</option>
        <option>Intel i5</option>
        <option>Intel i7</option>
        <option>AMD Ryzen 3</option>
        <option>AMD Ryzen 5</option>
    </select>
    <br><br>

    <label>Observaciones</label><br>
    <textarea name="observaciones" rows="5" cols="30"></textarea>
    <br><br>

    <button type="submit">Enviar</button>
    <button type="reset">Borrar</button>

</form>

</section>

</main>

<footer>
    <p>Formulario de ejemplo</p>
</footer>

    </script>
</body>
</html>
